version: '3.8'

services:
  db:
    image: postgres:15
    command: postgres -c shared_buffers=1GB -c effective_cache_size=3GB
    env_file:
      - .env
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    

  backend:
    build: ./backend
    command: gunicorn Lcoin.wsgi:application --bind 0.0.0.0:8000 --workers 9 --access-logfile - 
    volumes:
      - ./backend:/app
      - ./media_data:/app/media
      - static_volume:/app/staticfiles
    environment:
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=${DJANGO_DEBUG}
      - DATABASE_URL=${DATABASE_URL} 
      - FRONTEND_URL=${FRONTEND_URL} 
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    depends_on:
      - db
      
  frontend:
    build: 
      context: ./frontend
    volumes:
      - ./frontend:/app 
      - /app/node_modules
    stdin_open: true
    tty: true
    
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/dist:/usr/share/nginx/html 
      - static_volume:/app/staticfiles
      - ./media_data:/app/media
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_volume: